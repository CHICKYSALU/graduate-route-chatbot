<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}The Graduate Route{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a href="{{ url_for('index') }}" class="nav-brand">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="The Graduate Route" />
        The Graduate Route
      </a>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" id="navLinks">
        <li><a href="{{ url_for('index') }}" class="{{ 'active' if active == 'home' else '' }}">Home</a></li>
        <li><a href="{{ url_for('services') }}" class="{{ 'active' if active == 'services' else '' }}">Services</a></li>
        <li><a href="{{ url_for('faq') }}" class="{{ 'active' if active == 'faq' else '' }}">FAQ</a></li>
        <li><a href="{{ url_for('about') }}" class="{{ 'active' if active == 'about' else '' }}">About</a></li>
        <li><a href="{{ url_for('contact') }}" class="btn btn-primary nav-cta">Book a Consultation</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <img src="{{ url_for('static', filename='img/logo.png') }}" alt="" />
          The Graduate Route
        </div>
        <ul class="footer-links">
          <li><a href="{{ url_for('services') }}">Services</a></li>
          <li><a href="{{ url_for('faq') }}">FAQ</a></li>
          <li><a href="{{ url_for('about') }}">About</a></li>
          <li><a href="{{ url_for('contact') }}">Contact</a></li>
        </ul>
      </div>
      <p class="footer-note">#PaveYourWay &middot; &copy; The Graduate Route</p>
    </div>
  </footer>

  <script>
    document.getElementById('navToggle').addEventListener('click', function () {
      const links = document.getElementById('navLinks');
      const open = links.classList.toggle('open');
      this.setAttribute('aria-expanded', open);
    });
  </script>

  <script>
    window.GRADUATE_ROUTE_CHAT_API = "/chat";
    window.GRADUATE_ROUTE_LOGO_URL = "{{ url_for('static', filename='img/logo.png') }}";
  </script>
  <script src="{{ url_for('static', filename='js/chatbot-widget.js') }}"></script>
</body>
</html>
